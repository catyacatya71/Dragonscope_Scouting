<!DOCTYPE html>
<html>
<head>
  <title>1991 Pit Scouting</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
    }
    .site-header {
      background: #ff8601;
      color: black;
      text-align: center;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 2px;
      width: 100%;
    }
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 20px 16px;
    }
    .nav-buttons .button {
      flex: 1;
      max-width: 220px;
      text-align: center;
      font-size: 18px;
      padding: 16px 12px;
    }
    .dark-card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 600px;
      margin: 0 auto 40px auto;
      width: calc(100% - 32px);
    }
    .form-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 100%;
      margin: 0;
    }
    .form-label {
      display: block;
      text-align: left;
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .form-input {
      width: 100%;
      padding: 14px 12px;
      border-radius: 10px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 20px;
    }
    input.form-input {
      background-image: none;
    }
    .form-textarea {
      width: 100%;
      padding: 14px 12px;
      border-radius: 10px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
      min-height: 120px;
      resize: vertical;
    }
    .form-submit {
      background: #ff8601;
      color: black;
      font-size: 20px;
      font-weight: bold;
      padding: 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    .form-checkbox-row {
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      font-size: 16px;
    }
    .form-checkbox-row input[type="checkbox"] {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: #ff8601;
    }
    .section-divider {
      border: none;
      border-top: 1px solid #333;
      margin: 6px 0;
    }
  </style>
</head>
<body class="dark-body">

  <div class="site-header">DRAGONSCOPE</div>

  <div class="nav-buttons">
    <a class="button" href="index.html">Home</a>
    <a class="button" href="match.html">Match Scouting</a>
  </div>

  <div class="dark-card">
    <h1 class="form-title">Pit Scouting</h1>
    <form>

      <label class="form-label">Event</label>
      <select class="form-input" id="event">
        <option value="">Select an event...</option>
        <option value="2026mabil">2026 Minuteman</option>
        <option value="2026mawne">2026 Western NE</option>
        <option value="2026ctwat">2026 Waterbury</option>
        <option value="2026rikin">2026 URI</option>
        <option value="2026cthar">2026 Hartford</option>
      </select>

      <label class="form-label">Team</label>
      <select class="form-input" id="team" disabled>
        <option value="">Select an event first...</option>
      </select>
      
      <hr class="section-divider">

      <label class="form-label">Scouter Name</label>
      <input class="form-input" type="text">

     <label class="form-label">Scouter Team</label>
      <select class="form-input" id="scouter_team">
        <option value="">Select your team</option>
        <option value="10063">10063</option>
        <option value="1071">1071</option>
      </select>

      <hr class="section-divider">
      
      <label class="form-label">Drive Train Type</label>
      <select class="form-input" id="drive_train">
        <option value="">Select a drive train type</option>
        <option value="swerve">Swerve</option>
        <option value="tank">Tank</option>
        <option value="mecanum">Mecanum</option>
        <option value="other">Other (put in notes)</option>
        </select>

      <label class="form-label">Robot Width (inches)</label>
      <input class="form-input" type="text">

      <label class="form-label">Robot Length (inches)</label>
      <input class="form-input" type="text">

      <label class="form-label">Robot Weight (with battery & bumpers)</label>
      <input class="form-input" type="text">

      <label class="form-label">Swerve Drive Type</label>
      <select class="form-input">
        <option value="">Select Swerve Type</option>
        <option value="swerve">SDS MK4</option>
        <option value="swerve">SDS MK4i</option>
        <option value="swerve">SDS MK4c</option>
        <option value="swerve">SDS MK4n</option>
        <option value="swerve">SDS MK5i</option>
        <option value="swerve">SDS MK5n</option>
        <option value="swerve">REV Swerve</option>
        <option value="swerve">NOT USING SWERVE</option>
      </select>

<label class="form-label">Drive Train Motor Types</label>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: left; background: #2a2a2a; border-radius: 10px; padding: 14px;">
  
  <div style="color: #ff8601; font-weight: bold; font-size: 16px; padding-bottom: 6px; border-bottom: 1px solid #444;">Drive</div>
  <div style="color: #ff8601; font-weight: bold; font-size: 16px; padding-bottom: 6px; border-bottom: 1px solid #444;">Steering</div>

  <div class="form-checkbox-row">
    <input type="checkbox" name="drive_motor" value="kraken">
    <span>Kraken X60</span>
  </div>
  <div class="form-checkbox-row">
    <input type="checkbox" name="steer_motor" value="kraken">
    <span>Kraken X60</span>
  </div>

  <div class="form-checkbox-row">
    <input type="checkbox" name="drive_motor" value="kraken">
    <span>Kraken X44</span>
  </div>
  <div class="form-checkbox-row">
    <input type="checkbox" name="steer_motor" value="kraken">
    <span>Kraken X44</span>
  </div>
  
  <div class="form-checkbox-row">
    <input type="checkbox" name="drive_motor" value="falcon">
    <span>Falcon 500</span>
  </div>
  <div class="form-checkbox-row">
    <input type="checkbox" name="steer_motor" value="falcon">
    <span>Falcon 500</span>
  </div>

  <div class="form-checkbox-row">
    <input type="checkbox" name="drive_motor" value="neo">
    <span>NEO</span>
  </div>
  <div class="form-checkbox-row">
    <input type="checkbox" name="steer_motor" value="neo">
    <span>NEO</span>
  </div>

  <div class="form-checkbox-row">
    <input type="checkbox" name="drive_motor" value="neo_vortex">
    <span>NEO Vortex</span>
  </div>
  <div class="form-checkbox-row">
    <input type="checkbox" name="steer_motor" value="neo_vortex">
    <span>NEO Vortex</span>
  </div>

  <div class="form-checkbox-row">
    <input type="checkbox" name="drive_motor" value="cim">
    <span>CIM</span>
  </div>
  <div class="form-checkbox-row">
    <input type="checkbox" name="steer_motor" value="cim">
    <span>CIM</span>
  </div>

  <div class="form-checkbox-row">
    <input type="checkbox" name="drive_motor" value="other">
    <span>Other</span>
  </div>
  <div class="form-checkbox-row">
    <input type="checkbox" name="steer_motor" value="other">
    <span>Other</span>
  </div>

</div>

    <hr class="section-divider">

 <label class="form-label">How many autos do they have?</label>
      <input class="form-input" type="text">      

 <label class="form-label">Describe their preferred auto</label>
      <input class="form-input" type="text">

 <label class="form-label">Where do they start for auto?</label>
        <select class="form-input" id="auto_start">
        <option value="">Select a starting point</option>
        <option value="left">Left</option>
        <option value="center">Center</option>
        <option value="right">Right</option> 
        </select>

  <label class="form-label">Can they climb during auto?</label>
        <select class="form-input" id="auto_climb">
        <option value="">Select...</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
        </select>  

   <hr class="section-divider">
    
    <label class="form-label">What is their maximum fuel capacity?</label>
      <input class="form-input" type="text">
        
      <label class="form-label">Can they go over the bump?</label>
        <select class="form-input" id="bump">
        <option value="">Select...</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
        </select>  
    
    <label class="form-label">Can they go under the trench?</label>
        <select class="form-input" id="trench">
        <option value="">Select...</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
        </select>
        
        <label class="form-label">What is their average fuel scored per alliance shift?</label>
      <input class="form-input" type="text">
        
      <hr class="section-divider">
        
       <label class="form-label">Do they use automation? (vision, sensors, limit switches, etc.)</label>
        <select class="form-input" id="automation">
        <option value="">Select...</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
        </select>     
    
    <label class="form-label">How do they use automation?</label>
      <input class="form-input" type="text">
        
        <hr class="section-divider">
        
    
      <label class="form-label">Notes</label>
      <textarea class="form-textarea"></textarea>

      <button class="form-submit" type="submit">Submit</button>
    </form>
  </div>

  <script>
    let teamsData = {};
    fetch('teams.json')
      .then(res => res.json())
      .then(data => { teamsData = data; })
      .catch(err => console.error('Could not load teams.json:', err));

    document.getElementById('event').addEventListener('change', function () {
      const eventKey = this.value;
      const teamSelect = document.getElementById('team');
      teamSelect.innerHTML = '<option value="">Select a team...</option>';
      if (eventKey && teamsData[eventKey]) {
        teamsData[eventKey].forEach(team => {
          const option = document.createElement('option');
          option.value = team.number;
          option.textContent = `${team.number} – ${team.name}`;
          teamSelect.appendChild(option);
        });
        teamSelect.disabled = false;
      } else {
        teamSelect.innerHTML = '<option value="">Select an event first...</option>';
        teamSelect.disabled = true;
      }
    });
  </script>

</body>
</html>
